<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <style>
    /* ===== NAV HOVER EFFECT RÕ RÀNG ===== */

    .navbar-nav .nav-link {
      position: relative;
      font-weight: 600;
      padding-bottom: 8px;
      transition: color 0.3s ease;
    }

    /* Thanh gạch */
    .navbar-nav .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 3px;
      background: #004aad;   /* chỉ để 1 dòng này */
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* Hover */
    .navbar-nav .nav-link:hover {
      color: #0d6efd !important;
    }

    .navbar-nav .nav-link:hover::after {
      width: 100%;
    }
  </style>
</head>

<body>

<nav th:fragment="header"
     class="navbar navbar-expand-lg navbar-light bg-light shadow-sm px-5">

  <div class="container-fluid">

    <!-- Logo -->
    <a class="navbar-brand fw-bold text-primary fs-3" href="#">
      IGSE<span class="text-success"> GLOBAL</span>
    </a>

    <!-- Toggle mobile -->
    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse justify-content-center"
         id="navbarContent">

      <ul class="navbar-nav gap-4 fw-semibold">

        <li class="nav-item">
          <a class="nav-link" href="/">HOME</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">ABOUT US</a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle"
             href="#"
             role="button"
             data-bs-toggle="dropdown">
            PRODUCTS
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Product 1</a></li>
            <li><a class="dropdown-item" href="#">Product 2</a></li>
          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">PARTNERS</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">NEWS</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">CONTACT</a>
        </li>

      </ul>
    </div>

    <!-- Right side -->
    <div class="d-flex align-items-center gap-3">

      <i class="bi bi-search fs-5"></i>

      <img src="https://flagcdn.com/w20/gb.png"
           width="24"
           class="rounded shadow-sm">

      <img src="https://flagcdn.com/w20/vn.png"
           width="24"
           class="rounded shadow-sm">

    </div>

  </div>
</nav>

</body>
</html>
